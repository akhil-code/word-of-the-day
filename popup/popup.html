<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word of the Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="word-card">
    <div class="word-label">Word of the Day</div>
    <h2 class="word-title" id="word">Loading...</h2>
    <p class="word-speech-part" id="speech-part"></p>
    <p class="word-definition" id="definition">Fetching today's word...</p>
    <button class="btn-next" id="refresh-button">Next Word →</button>
  </div>
  <p class="word-note">
    You can now access Word of the Day at
    <a href="https://words.url2.at" target="_blank" rel="noopener noreferrer">words.url2.at</a>
  </p>
  <p class="word-note">
    The word of the day stays the same for the whole day. To move to the next one, click <strong>Next Word</strong>
  </p>
</body>
<script src="popup.js"></script>
</html>
