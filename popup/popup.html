<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word of the Day</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- <div class="title">Word of the Day</div> -->
  <div class="word-card">
    <div class="word-label">Word of the Day</div>
    <h2 class="word-title" id="word">Loading...</h2>
    <p class="word-speech-part" id="speech-part"></p>
    <p class="word-definition" id="definition">Fetching today's word...</p>
    <button class="btn-next" id="refresh-button">Next Word →</button>
  </div>
</body>
<script src="popup.js"></script>
</html>
